services:
  app-backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
      target: runner
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=postgresql://${POSTGRES_USER:-production_user}:${POSTGRES_PASSWORD:-prod_secure_pass}@postgres:5432/${POSTGRES_DB:-tradovate_prod}?schema=public
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - tradovate-net

  app-frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
      target: runner
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    env_file:
      - .env
    command: nginx -g "daemon off;"
    networks:
      - tradovate-net
    depends_on:
      - app-backend

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-production_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-prod_secure_pass}
      POSTGRES_DB: ${POSTGRES_DB:-tradovate_prod}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - tradovate-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-production_user} -d ${POSTGRES_DB:-tradovate_prod}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    networks:
      - tradovate-net
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - app-backend
      - app-frontend
    networks:
      - tradovate-net

volumes:
  pgdata:
  redisdata:


networks:
  tradovate-net:
    driver: bridge
