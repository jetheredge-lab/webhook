version: '3.8'

services:
  app-backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
      target: runner
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3001
    depends_on:
      - postgres
      - redis
    networks:
      - tradovate-net

  app-frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
      target: runner
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    env_file:
      - .env
    networks:
      - tradovate-net

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-production_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-prod_secure_pass}
      POSTGRES_DB: ${POSTGRES_DB:-tradovate_prod}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - tradovate-net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    networks:
      - tradovate-net

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - app-backend
      - app-frontend
    networks:
      - tradovate-net

volumes:
  pgdata:
  redisdata:


networks:
  tradovate-net:
    driver: bridge
