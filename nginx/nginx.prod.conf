events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Rate Limiting Zones
    limit_req_zone $binary_remote_addr zone=webhook_limit:10m rate=20r/m;
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=50r/s;

    server {
        listen 80;
        server_name _;

        # Redirect all HTTP requests to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name _;

        # SSL Configuration mapped to Certbot
        ssl_certificate     /etc/letsencrypt/live/trading.meetiqpro.ai/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/trading.meetiqpro.ai/privkey.pem;

        # Frontend Static Files
        location / {
            proxy_pass http://app-frontend:80/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Consolidated Backend API (Case Insensitive)
        location ~* ^/api/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://app-backend:3001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Backward Compatibility for old TradingView alerts using /webhook/ (Case Insensitive)
        location ~* ^/webhook/ {
            limit_req zone=api_limit burst=20 nodelay;
            rewrite ^(?i)/webhook/(.*) /api/webhook/$1 break;
            proxy_pass http://app-backend:3001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Socket.IO Real-time Connection
        location /socket.io/ {
            proxy_pass http://app-backend:3001/socket.io/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }
    }
}
